Here’s a simple **`index.html`** template you can use:

```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background: #333;
            color: #fff;
            padding: 15px 0;
        }
        main {
            padding: 20px;
        }
        footer {
            background: #333;
            color: #fff;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <main>
        <h2>Hello 👋</h2>
        <p>This is your index.html file.</p>
        <button onclick="sayHello()">Click Me</button>
    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <script>
        function sayHello() {
            alert("Hello! Welcome to your website 🚀");
        }
    </script>

</body>
</html>
```
